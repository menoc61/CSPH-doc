name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: '22'

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. Lint Markdown
  # ──────────────────────────────────────────────────────────────
  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.42.0

      - name: Create .markdownlint.json
        run: |
          cat > .markdownlint.json << 'EOF'
          {
            "default": true,
            "MD013": false,
            "MD024": { "siblings_only": true },
            "MD033": false,
            "MD041": false,
            "MD046": { "style": "fenced" }
          }
          EOF

      - name: Run markdownlint
        run: markdownlint '**/*.md' --ignore node_modules

  # ──────────────────────────────────────────────────────────────
  # 2. Vérification des liens internes
  # ──────────────────────────────────────────────────────────────
  link-check:
    name: Check internal links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress --exclude-file .lycheeignore ./docs/... ./README.md ./CONTRIBUTING.md ./AGENTS.md ./CONTEXT.md
          fail: true

      - name: Upload broken links
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: lychee/out.md

  # ──────────────────────────────────────────────────────────────
  # 3. Validation du rendu Mermaid
  # ──────────────────────────────────────────────────────────────
  mermaid-render:
    name: Render Mermaid diagrams
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli@10.9.1

      - name: Extract Mermaid blocks and render
        shell: bash
        run: |
          mkdir -p /tmp/mermaid-svg
          # Extraction naïve des blocs mermaid
          for f in $(find docs -name "*.md"); do
            awk '
              /^```mermaid$/ { in_block=1; block=""; n++; next }
              /^```$/ && in_block { 
                fname = sprintf("/tmp/mermaid-svg/%s-%d.svg", FILENAME, n)
                gsub("/", "_", fname)
                print block > fname
                in_block=0
                next
              }
              in_block { block = block $0 "\n" }
            ' "$f"
          done

          if [ -z "$(ls -A /tmp/mermaid-svg 2>/dev/null)" ]; then
            echo "No Mermaid blocks found — nothing to render"
            exit 0
          fi

          cd /tmp/mermaid-svg
          for svg in *.svg; do
            echo "Rendering $svg..."
            mmdc -i "$svg" -o "${svg%.svg}.out.svg" 2>&1 || { echo "FAILED: $svg"; exit 1; }
          done

          echo "All Mermaid blocks rendered successfully"

      - name: Upload rendered SVGs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mermaid-svgs
          path: /tmp/mermaid-svg/

  # ──────────────────────────────────────────────────────────────
  # 4. Validation de la syntaxe des fichiers eraser.io
  # ──────────────────────────────────────────────────────────────
  eraser-syntax:
    name: Validate eraser.io files
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: List eraser files
        run: |
          if [ -d "docs/diagrams/eraser" ]; then
            ls -la docs/diagrams/eraser/
            echo "::notice::Eraser files found, manual validation recommended (no CLI available)"
          else
            echo "No eraser files to validate"
          fi

  # ──────────────────────────────────────────────────────────────
  # 5. Validation des ADR (frontmatter YAML)
  # ──────────────────────────────────────────────────────────────
  adr-lint:
    name: Lint ADR frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install js-yaml
        run: npm install -g js-yaml@4.1.0

      - name: Validate ADR frontmatter
        shell: bash
        run: |
          status=0
          for f in $(find docs/adr -name "*.md" -type f); do
            # Extraction du frontmatter YAML
            content=$(awk 'BEGIN{p=0} /^---$/{p++; next} p==1{print}' "$f")
            if [ -z "$content" ]; then
              echo "::warning file=$f::No frontmatter found"
              continue
            fi
            # Validation YAML
            echo "$content" | node -e "
              let data = '';
              process.stdin.on('data', c => data += c);
              process.stdin.on('end', () => {
                try {
                  const yaml = require('js-yaml');
                  const doc = yaml.load(data);
                  if (!doc.numero || !doc.titre || !doc.statut) {
                    console.error('Missing required fields in $f');
                    process.exit(1);
                  }
                  console.log('OK: $f');
                } catch (e) {
                  console.error('YAML parse error in $f:', e.message);
                  process.exit(1);
                }
              });
            " || status=1
          done
          exit $status

  # ──────────────────────────────────────────────────────────────
  # Résumé
  # ──────────────────────────────────────────────────────────────
  ci-status:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint-markdown, link-check, mermaid-render, eraser-syntax, adr-lint]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          echo "## CI Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint Markdown | ${{ needs.lint-markdown.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Link check | ${{ needs.link-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mermaid render | ${{ needs.mermaid-render.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Eraser syntax | ${{ needs.eraser-syntax.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ADR lint | ${{ needs.adr-lint.result }} |" >> $GITHUB_STEP_SUMMARY
